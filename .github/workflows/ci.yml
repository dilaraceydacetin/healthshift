name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: healthshift
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/healthshift
      LLM_API_KEY: test-key
      LLM_MODEL: llama-3.3-70b-versatile
      LLM_BASE_URL: https://api.groq.com/openai/v1

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r energy/requirements.txt
          pip install -r symptom/requirements.txt
          pip install pytest httpx

      - name: Run tests
        run: |
          pytest energy/tests/ symptom/tests/ -v

  build-and-push:
    needs: test  # Sadece testler başarıyla geçerse çalışır
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' # Sadece main'e push yapıldığında çalışır
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.YOUR_SECRET_NAME }}
          password: ${{ secrets.YOUR_DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 'latest' her zaman güncel kalır, 'sha' ise geriye dönük takip sağlar
          tags: |
            ${{ secrets.YOUR_SECRET_NAME }}/healthshift-backend:latest
            ${{ secrets.YOUR_SECRET_NAME }}/healthshift-backend:${{ github.sha }}